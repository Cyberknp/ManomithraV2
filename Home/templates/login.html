<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Login - Manomitra</title>
        <link rel="icon" type="image/x-icon" href="manomitra.png" />
        <style>
            body {
                margin: 0;
                padding: 0;
                height: 100vh;
                display: flex;
                justify-content: center;
                align-items: center;
                font-family: Arial, sans-serif;
                background-color: #f4f8f6;
                color: #2e3133;
            }

            .login-container {
                max-width: 400px;
                width: 90%;
                background: #fff;
                padding: 20px;
                box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
                border-radius: 10px;
                text-align: center;
            }

            .login-container h2 {
                margin-bottom: 20px;
                color: #2e3133;
            }

            .login-container input[type="text"],
            .login-container input[type="password"] {
                width: calc(100% - 20px);
                padding: 10px;
                margin: 10px 0;
                border: 1px solid #ccc;
                border-radius: 5px;
                font-size: 1em;
            }

            .login-container button {
                padding: 10px 20px;
                border: none;
                border-radius: 5px;
                font-size: 1em;
                background-color: #444;
                color: #fff;
                cursor: pointer;
                transition: background-color 0.3s;
                margin-top: 10px;
            }

            .login-container button:hover {
                background-color: #666;
            }

            .login-container p {
                margin-top: 15px;
                font-size: 0.9em;
            }

            .login-container p a {
                color: #9f73b6;
                text-decoration: none;
            }

            .login-container p a:hover {
                text-decoration: underline;
            }
        </style>
    </head>
    <body>
        <div class="login-container">
            {% if messages %}
            <div class="alert">
                {% for message in messages %}
                <p>{{ message }}</p>
                {% endfor %}
            </div>
            {% endif %}
            <h2>Login</h2>
            <form action="/login/" method="post">
                {% csrf_token %}
                <input
                    type="text"
                    placeholder="Username"
                    name="username"
                    required
                />
                <input
                    type="password"
                    placeholder="Password"
                    name="password"
                    required
                />
                <button type="submit">Login</button>
            </form>
            <p>Don't have an account? <a href="/signup/">Sign-Up</a></p>
        </div>
    </body>
</html>
